name: build main
on:
  push:
    branches-ignore:
      - "python/**"
      - "scala/**"
  pull_request:
    branches:
      - "**"
permissions:
  contents: read
  id-token: write
jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        python: [ 3.12.3 ]
        pytest: [8.4.2]
        numpy: [ 2.1.3 ]
        gdal: [ 3.11.4 ]
        spark: [ 4.0.0 ]
    steps:
      - name: checkout code
        uses: actions/checkout@v5
      - name: build scala
        uses: ./.github/actions/scala_build
        with:
          enable_coverage: "false"
      - name: build python
        uses: ./.github/actions/python_build
      - name: upload artifacts
        uses: ./.github/actions/upload_artifacts
