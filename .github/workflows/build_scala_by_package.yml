# Run Scala unit tests by package in parallel (no coverage). Fast feedback per package.
# Trigger: workflow_dispatch or optionally on push/PR.
# Same matrix pattern as codecov-scala-parallel; use for test-only runs.

name: Scala tests (by package)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  test-package:
    name: Test ${{ matrix.package }}
    runs-on: larger
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        package: [rasterx, gridx, vectorx, ds, expressions, util]
        python: [3.12.3]
        pytest: [8.4.2]
        numpy: [2.1.3]
        gdal: [3.11.4]
        spark: [4.0.0]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create pip cache key file
        run: |
          echo "${{ github.ref }}-${{ matrix.python }}-${{ matrix.numpy }}-${{ matrix.spark }}-${{ matrix.gdal }}" > .ci-pip-cache-key

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: .cache/apt-archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/actions/scala_build/action.yml') }}

      - name: Run Scala tests (one package)
        uses: ./.github/actions/scala_build
        with:
          skip_tests: "false"
          enable_coverage: "false"
          fail_on_scalastyle: "false"
          suite_pattern: "com.databricks.labs.gbx.${{ matrix.package }}.*"
