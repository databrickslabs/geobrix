# Build and deploy Docusaurus docs to GitHub Pages.
# Public site URL: https://databrickslabs.github.io/geobrix/
#
# First-time setup: In repo Settings → Pages → Build and deployment,
# set Source to "GitHub Actions".
#
# If the org enforces an IP allow list, use a self-hosted runner (e.g. larger)
# inside the allowlisted network; ubuntu-latest cannot be used in that case.
name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: larger
    steps:
      # For restricted GITHUB_TOKEN, add secret REPO_ACCESS_TOKEN (PAT with repo scope) if needed.
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: cd docs && npm ci

      - name: Build
        run: cd docs && npm run build
        env:
          NODE_ENV: production
          # Force public GitHub Pages baseUrl (https://databrickslabs.github.io/geobrix/)
          DOCS_PUBLIC_PAGES: '1'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: larger
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
