# Build and deploy Docusaurus docs to GitHub Pages.
# Site URL: https://databrickslabs.github.io/geobrix/
#
# First-time setup: In repo Settings → Pages → Build and deployment,
# set Source to "GitHub Actions" (or "Deploy from a branch" and choose gh-pages).
# If using branch: after first run, set Source to branch "gh-pages", root / (root).
#
# Private repo 403 on checkout: If you get "The requested URL returned error: 403"
# when checking out, add a repo secret (e.g. REPO_ACCESS_TOKEN) with a Personal
# Access Token (classic: repo scope; or fine-grained: Contents read), then set
# token for the Checkout step to: ${{ secrets.REPO_ACCESS_TOKEN }}
name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Use token explicitly; for private repos with restricted GITHUB_TOKEN,
      # add secret REPO_ACCESS_TOKEN (PAT with repo/Contents read) and use it here.
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: cd docs && npm ci

      - name: Build
        run: cd docs && npm run build
        env:
          # Production URL for GitHub Pages
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
