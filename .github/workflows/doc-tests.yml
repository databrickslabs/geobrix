name: Documentation Tests

# DOCUMENTATION UNIT TESTS ARE DISABLED UNTIL PROJECT LAUNCH.
# The jobs below are skipped (if: false). Re-enable by removing the condition
# and this notice when ready for launch.
#
# When enabled: run documentation tests to ensure all code examples are valid
# and verify the single source of truth between docs and tests.
#
# NOTE: This workflow EXCLUDES docs/tests-dbr/ which contains Databricks Runtime
# integration tests. Those tests require DBR-specific SQL functions (st_*, etc.)
# and must be run in a Databricks environment.
#
# Private repo: Checkout uses REPO_ACCESS_TOKEN if set, else GITHUB_TOKEN (same as deploy-docs).
#
# Runs after "build main" completes; also runnable manually via workflow_dispatch.

on:
  # Run after build main completes (PR or push to any branch). Doc tests run
  # last so failing doc tests do not interrupt build, test, or coverage.
  workflow_run:
    workflows: ["build main"]
    types: [completed]
  workflow_dispatch:  # Allow manual triggering from CI scripts

permissions:
  contents: read

jobs:
  doc-tests-disabled-notice:
    name: Notice
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## Documentation unit tests are disabled until project launch" >> $GITHUB_STEP_SUMMARY
          echo "Re-enable in .github/workflows/doc-tests.yml and build_main.yml when ready." >> $GITHUB_STEP_SUMMARY

  test-python-docs:
    name: Python Documentation Tests
    runs-on: ubuntu-latest
    if: false  # Disabled until project launch

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install requests geopandas
      
      - name: Run documentation tests
        run: |
          pytest docs/tests/python/ \
            -v \
            --tb=short \
            --cov=docs/tests/python \
            --cov-report=term-missing \
            --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          flags: docs
          name: doc-tests
          fail_ci_if_error: false
      
      - name: Test Summary
        if: always()
        run: |
          echo "## Documentation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f .coverage ]; then
            echo "✅ Tests completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed" >> $GITHUB_STEP_SUMMARY
          fi

  test-scala-docs:
    name: Scala Documentation Tests
    runs-on: ubuntu-latest
    if: false  # Disabled until Scala doc tests are created
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Run Scala documentation tests
        run: |
          # TODO: Run ScalaTest for docs/scala tests
          echo "Scala doc tests not yet implemented"

  validate-structure:
    name: Validate Documentation Structure
    runs-on: ubuntu-latest
    if: false  # Disabled until project launch

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      
      - name: Verify test structure
        run: |
          echo "Checking documentation test structure..."
          
          # Check that each .py file in docs/tests/python has a corresponding test_*.py
          find docs/tests/python -name "*.py" -not -name "test_*.py" -not -name "__*" | while read file; do
            dir=$(dirname "$file")
            base=$(basename "$file" .py)
            test_file="${dir}/test_${base}.py"
            
            if [ ! -f "$test_file" ]; then
              echo "❌ Missing test file for: $file"
              echo "   Expected: $test_file"
              exit 1
            else
              echo "✅ Found test for: $file"
            fi
          done
          
          echo "All documentation code has corresponding tests!"
      
      - name: Check for code duplication
        run: |
          echo "Checking for code duplication between docs and tests..."
          
          # This is a placeholder - could add more sophisticated checks
          # e.g., check that docs don't contain embedded Python code blocks
          
          echo "Structure validation complete!"

  report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [doc-tests-disabled-notice, test-python-docs, validate-structure]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## Documentation Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All documentation code must:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Have corresponding tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Pass all test validations" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Be importable by documentation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Single source of truth ensures docs stay accurate!**" >> $GITHUB_STEP_SUMMARY
