[pytest]
# Pytest configuration for Databricks Runtime (DBR) integration tests
# These tests require Databricks-specific SQL functions and environment
# They are EXCLUDED from regular unit test runs and coverage reporting

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = python
norecursedirs = __pycache__ .git

# Output formatting
addopts = 
    # Verbose output
    -v
    # Show extra test summary info
    -ra
    # Short traceback format
    --tb=short
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (must register custom markers)
    --strict-markers
    # Warnings
    -W error::UserWarning
    -W ignore::DeprecationWarning

# Custom markers for DBR-specific tests
markers =
    databricks: Tests that require Databricks Runtime (st_* functions, etc.)
    spatial_sql: Tests that use Databricks spatial SQL functions
    integration: Full integration tests with DBR cluster

# NO COVERAGE REPORTING FOR DBR TESTS
# These are integration tests, not unit tests
# Coverage should be measured on the main codebase via unit tests
