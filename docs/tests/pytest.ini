[pytest]
# Pytest configuration for documentation tests
# These tests ensure code shown in documentation is valid and working

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths (exclude tests-dbr which are Databricks-specific integration tests)
testpaths = python
norecursedirs = tests-dbr __pycache__ .git

# Output formatting
addopts = 
    # Verbose output
    -v
    # Show extra test summary info
    -ra
    # Short traceback format
    --tb=short
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (must register custom markers)
    --strict-markers
    # Warnings
    -W error::UserWarning
    -W ignore::DeprecationWarning

# Custom markers for different test types
markers =
    structure: Tests that verify code structure (imports, signatures, docstrings)
    logic: Tests that verify code logic with mocks (requires unittest.mock)
    integration: Tests that require DBR or integration env (excluded by default; run with -m integration or --include-integration)
    scala: Tests for Scala documentation code
    python: Tests for Python documentation code
    setup: Tests for setup/configuration code
    rasterx: Tests for RasterX API examples
    vectorx: Tests for VectorX API examples
    gridx: Tests for GridX API examples

# Coverage settings (if using pytest-cov)
[coverage:run]
source = python
omit = 
    */test_*.py
    */__pycache__/*
    */venv/*
    ../tests-dbr/*

[coverage:report]
# Fail if coverage falls below this threshold
fail_under = 70
# Show missing lines
show_missing = True
# Skip covered files
skip_covered = False
# Precision for coverage percentage
precision = 1

[coverage:html]
directory = htmlcov
