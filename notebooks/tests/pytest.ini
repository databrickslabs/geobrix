[pytest]
# Notebook execution tests: mirrors notebooks/ hierarchy under notebooks/tests/
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = .
norecursedirs = __pycache__ .git

addopts = -v --tb=short
markers =
    integration: Full notebook execution (downloads, network). Run with: pytest -m integration

# Suppress third-party Pydantic v1 Config deprecation (e.g. planetary_computer.sas)
filterwarnings =
    ignore:Support for class-based.*config.*is deprecated:DeprecationWarning
